# fly.toml — ServalSheets remote MCP server deployment
# https://fly.io/docs/reference/configuration/

app = "servalsheets"
primary_region = "iad"  # IAD = Northern Virginia (low latency to Anthropic)

[build]
  dockerfile = "Dockerfile.fly"

[env]
  NODE_ENV = "production"
  HOST = "::"
  PORT = "3000"
  LOG_LEVEL = "info"
  DEBUG_STARTUP_TRACE = "true"
  ENABLE_LEGACY_SSE = "false"
  ENABLE_RBAC = "true"
  OAUTH_ISSUER = "https://servalsheets.fly.dev"
  DATA_DIR = "/data/state"
  PROFILE_STORAGE_DIR = "/data/profiles"
  TRANSACTION_WAL_DIR = "/data/wal"
  # Set these via: fly secrets set ...
  # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, OAUTH_CLIENT_SECRET,
  # JWT_SECRET, STATE_SECRET, AUDIT_LOG_ENCRYPTION_KEY, REDIS_URL,
  # CORS_ORIGINS, ALLOWED_REDIRECT_URIS

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false    # Keep alive — MCP sessions are long-lived
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health/ready"
    protocol = "http"
    timeout = "5s"

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "servalsheets_data"
  destination = "/data"

# Launch on one machine until shared durable storage is in place.
# DATA_DIR and PROFILE_STORAGE_DIR currently rely on the mounted Fly volume.

[metrics]
  port = 3000
  path = "/metrics"
