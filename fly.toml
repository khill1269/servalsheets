# fly.toml — ServalSheets remote MCP server
app = "servalsheets-2"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "node dist/http-server.js"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"
  ENABLE_LEGACY_SSE = "false"

[[mounts]]
  source = "data"
  destination = "/data"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/health/live"
    timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "2gb"

[metrics]
  port = 3000
  path = "/metrics"
