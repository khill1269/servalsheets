# fly.toml — ServalSheets remote MCP server deployment
# https://fly.io/docs/reference/configuration/

app = "servalsheets"
primary_region = "iad"  # IAD = Northern Virginia (low latency to Anthropic)

[build]
  dockerfile = "Dockerfile.fly"

[env]
  NODE_ENV = "production"
  HOST = "::"
  PORT = "3000"
  LOG_LEVEL = "info"
  DEBUG_STARTUP_TRACE = "false"
  ENABLE_LEGACY_SSE = "false"
  ENABLE_RBAC = "true"
  OAUTH_ISSUER = "https://servalsheets.fly.dev"
  DATA_DIR = "/data/state"
  PROFILE_STORAGE_DIR = "/data/profiles"
  TRANSACTION_WAL_DIR = "/data/wal"
  # Hardening
  ENABLE_AGGRESSIVE_FIELD_MASKS = "true"
  ENABLE_REQUEST_MERGING = "true"
  ENABLE_PARALLEL_EXECUTOR = "true"
  CACHE_REDIS_ENABLED = "true"
  SESSION_STORE_TYPE = "redis"
  # Node.js tuning for 1GB container
  NODE_OPTIONS = "--max-old-space-size=768 --enable-source-maps"
  # Required secrets — set via: fly secrets set KEY=VALUE
  #
  # Redis (Upstash):
  #   fly redis create --name servalsheets-redis --region iad
  #   fly secrets set REDIS_URL="rediss://default:<password>@<host>:6379"
  #   Note: Use rediss:// (TLS) for Upstash; plain redis:// only for internal
  #
  # Google OAuth:
  #   fly secrets set GOOGLE_CLIENT_ID="xxx.apps.googleusercontent.com"
  #   fly secrets set GOOGLE_CLIENT_SECRET="GOCSPX-xxx"
  #
  # OR Google Service Account (alternative — no user consent required):
  #   fly secrets set GOOGLE_SERVICE_ACCOUNT_KEY='{"type":"service_account",...}'
  #
  # Security:
  #   fly secrets set OAUTH_CLIENT_SECRET="<random-32-chars>"
  #   fly secrets set JWT_SECRET="<random-32-chars>"
  #   fly secrets set STATE_SECRET="<random-32-chars>"
  #   fly secrets set AUDIT_LOG_ENCRYPTION_KEY="<random-64-hex-chars>"
  #   fly secrets set CORS_ORIGINS="https://claude.ai,https://your-domain.com"
  #   fly secrets set ALLOWED_REDIRECT_URIS="https://claude.ai/api/mcp/auth_callback"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false    # Keep alive — MCP sessions are long-lived
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # Liveness: is the process running?
  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    path = "/health/live"
    protocol = "http"
    timeout = "5s"

  # Readiness: can it serve traffic?
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health/ready"
    protocol = "http"
    timeout = "5s"

  # MCP protocol probe — validates tool registration is up
  [[http_service.checks]]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    path = "/health/ready"
    protocol = "http"
    timeout = "10s"
    headers = { "Accept" = "application/json" }

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["app"]

[[mounts]]
  source = "servalsheets_data"
  destination = "/data"
  initial_size = "1gb"

[processes]
  app = "node dist/http-server-entry.js"

[metrics]
  port = 3000
  path = "/metrics"

# Graceful shutdown — allow in-flight MCP requests to complete
[experimental]
  kill_signal = "SIGTERM"
  kill_timeout = "30s"

# Deploy strategy: canary with automatic rollback
[deploy]
  strategy = "canary"
  release_command = "node -e \"require('./dist/schemas/index.js')\" || exit 1"
