name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '37 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scorecards-${{ github.ref }}
  cancel-in-progress: false

jobs:
  skip-unsupported-dispatch:
    name: Skip unsupported branch dispatch
    if: github.event_name == 'workflow_dispatch' && github.ref_name != github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Summarize unsupported dispatch
        run: |
          echo "## OpenSSF Scorecard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- The scorecard action only supports the default branch (${{ github.event.repository.default_branch }})." >> "$GITHUB_STEP_SUMMARY"
          echo "- This manual dispatch ran on ${GITHUB_REF_NAME}, so analysis was skipped intentionally." >> "$GITHUB_STEP_SUMMARY"

  analysis:
    name: Scorecards analysis
    if: github.event_name != 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: scorecard-results.sarif

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 7
