name: Coverage Tracking

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate coverage summary
        id: coverage
        run: |
          # Extract coverage percentages
          STATEMENTS=$(cat coverage/coverage-summary.json | jq -r '.total.statements.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq -r '.total.branches.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq -r '.total.functions.pct')
          LINES=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')

          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT

          # Create badge color based on coverage
          if (( $(echo "$LINES >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$LINES >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-servalsheets
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Download base branch coverage (for delta)
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: coverage-base/
          key: coverage-${{ github.base_ref }}-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            coverage-${{ github.base_ref }}-

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;

            const fmt = (n) => n.toFixed(2) + '%';
            const delta = (curr, base) => {
              if (base === undefined) return '—';
              const d = curr - base;
              const sign = d >= 0 ? '+' : '';
              const emoji = d > 0.5 ? ' 📈' : d < -0.5 ? ' 📉' : '';
              return `${sign}${d.toFixed(2)}%${emoji}`;
            };

            let base = null;
            try {
              base = JSON.parse(fs.readFileSync('coverage-base/coverage-summary.json', 'utf8')).total;
            } catch (e) {
              // No base coverage available (first run on this base branch)
            }

            const rows = [
              ['Statements', total.statements.pct, base?.statements?.pct],
              ['Branches',   total.branches.pct,   base?.branches?.pct],
              ['Functions',  total.functions.pct,   base?.functions?.pct],
              ['Lines',      total.lines.pct,        base?.lines?.pct],
            ];

            const tableRows = rows.map(([name, curr, b]) =>
              `| **${name}** | ${fmt(curr)} | ${delta(curr, b)} |`
            ).join('\n');

            const overallEmoji = total.lines.pct >= 80 ? '✅' : total.lines.pct >= 60 ? '⚠️' : '❌';

            const comment = `## ${overallEmoji} Coverage Report

            | Metric | Coverage | vs Base |
            |--------|----------|---------|
            ${tableRows}

            <details>
            <summary>📁 Full report</summary>

            Available in [workflow artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            </details>

            ---
            *Generated by [Coverage Action](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Save coverage for future delta comparisons
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/cache/save@v4
        with:
          path: coverage/
          key: coverage-${{ github.ref_name }}-${{ github.sha }}

      - name: Check coverage thresholds
        run: |
          STATEMENTS=$(cat coverage/coverage-summary.json | jq -r '.total.statements.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq -r '.total.branches.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq -r '.total.functions.pct')
          LINES=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')

          echo "Coverage Summary:"
          echo "  Statements: $STATEMENTS%"
          echo "  Branches: $BRANCHES%"
          echo "  Functions: $FUNCTIONS%"
          echo "  Lines: $LINES%"

          # Check if coverage meets minimum thresholds (configurable via vitest.config.ts)
          if (( $(echo "$LINES < 75" | bc -l) )); then
            echo "::warning::Line coverage ($LINES%) is below threshold (75%)"
          fi

          if (( $(echo "$BRANCHES < 70" | bc -l) )); then
            echo "::warning::Branch coverage ($BRANCHES%) is below threshold (70%)"
          fi

      - name: Report status
        run: |
          echo "✅ Coverage report generated successfully"
          echo ""
          echo "Coverage: ${{ steps.coverage.outputs.lines }}%"
          echo "Status: ${{ steps.coverage.outputs.color }}"
