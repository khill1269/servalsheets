# Deploy Demo to Google Cloud Run
name: Deploy Demo

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-demo-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: servalsheets-demo

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check required deployment secrets
        id: check-secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$GCP_PROJECT_ID" ] && [ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] && [ -n "$GCP_SERVICE_ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "✓ Required deployment secrets are configured"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "## Demo Deployment Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Required GCP deployment secrets are missing, so demo deployment was skipped." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Authenticate to Google Cloud
        if: steps.check-secrets.outputs.ready == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          cleanup_credentials: true

      - name: Set up Cloud SDK
        if: steps.check-secrets.outputs.ready == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        if: steps.check-secrets.outputs.ready == 'true'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          docker build \
            -f deployment/demo/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/servalsheets/${{ env.SERVICE_NAME }}:${{ github.event.workflow_run.head_sha || github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/servalsheets/${{ env.SERVICE_NAME }}:latest \
            .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/servalsheets/${{ env.SERVICE_NAME }}:${{ github.event.workflow_run.head_sha || github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/servalsheets/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/servalsheets/${{ env.SERVICE_NAME }}:${{ github.event.workflow_run.head_sha || github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "DEMO_MODE=true,READ_ONLY=true,RATE_LIMIT_MAX_REQUESTS=30" \
            --set-secrets "GOOGLE_APPLICATION_CREDENTIALS_JSON=servalsheets-demo-credentials:latest"

      - name: Show Service URL
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'
