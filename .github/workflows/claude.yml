name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    runs-on: ubuntu-latest
    # Only run on @claude mentions (issue/PR comments) or auto-review on PR open
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # On PR open/sync: auto-review against CLAUDE.md standards
          # On @claude mention: respond to the specific request
          claude_args: >-
            --max-turns 10
            --model claude-sonnet-4-6
            --append-system-prompt "You are reviewing a production-grade MCP server (ServalSheets). Follow CLAUDE.md rules strictly: minimal changes, no refactors while debugging, verify before claiming."
