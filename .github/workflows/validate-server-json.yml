name: Validate server.json

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-server-json-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:server-json
