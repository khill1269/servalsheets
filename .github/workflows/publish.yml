name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode'
        required: false
        default: 'false'

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for uploading SBOM to GitHub release
      id-token: write # Required for npm provenance + cosign keyless signing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release readiness gate
        run: npm run verify:release

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm (dry-run)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: npm publish --dry-run --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ github.event.inputs.dry-run != 'true' && github.event_name == 'release' }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # SC-01: Generate signed SBOM and attach to GitHub release
      - name: Generate SBOM (CycloneDX)
        if: ${{ github.event_name == 'release' }}
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json

      - name: Install cosign
        if: ${{ github.event_name == 'release' }}
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign SBOM with Sigstore (keyless)
        if: ${{ github.event_name == 'release' }}
        run: cosign sign-blob --yes sbom.json --output-signature sbom.json.sig

      - name: Attach signed SBOM to GitHub release
        if: ${{ github.event_name == 'release' }}
        run: gh release upload ${{ github.event.release.tag_name }} sbom.json sbom.json.sig --clobber
        env:
          GH_TOKEN: ${{ github.token }}
