name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        id: dependency_review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        continue-on-error: true
        with:
          fail-on-severity: moderate

      - name: Report unsupported dependency review
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review is informational in this repository and is not currently supported for all PR contexts."

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check security exception review dates
        id: security_exceptions
        run: npm run check:security-exceptions

      - name: Run npm audit (fail on high/critical)
        # SECURITY EXCEPTION: node-saml → xml-encryption → node-forge has unfixable high/critical
        # vulns (GHSA-65ch-62r8-g69g etc.) with no upstream fix. xmldom patched via overrides.
        # Re-evaluate when node-saml v4 stable ships.
        # Exception tracked in SECURITY_EXCEPTIONS.md — review by 2026-06-26.
        continue-on-error: true
        run: |
          echo "::warning::npm audit high-level check has continue-on-error due to node-saml transitive vuln (GHSA-65ch-62r8-g69g). See SECURITY_EXCEPTIONS.md."
          npm audit --audit-level=high

      - name: Run npm audit (warn on moderate)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate audit report
        if: always()
        run: |
          npm audit --json > npm-audit-report.json || true

      - name: Open issue for overdue security exception review
        if: github.event_name == 'schedule' && failure() && steps.security_exceptions.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = 'Security exception review overdue';
            const body = [
              'The scheduled security workflow detected an overdue entry in `SECURITY_EXCEPTIONS.md`.',
              '',
              'Run `npm run check:security-exceptions` locally and either update the exception, resolve it, or remove the waiver.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              core.info(`Issue already open: #${existing.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine TruffleHog scan range
        id: trufflehog-range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=diff" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "${{ github.sha }}" ]; then
            echo "mode=diff" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: TruffleHog OSS (diff scan)
        if: steps.trufflehog-range.outputs.mode == 'diff'
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.94.1
        with:
          path: ./
          base: ${{ steps.trufflehog-range.outputs.base }}
          head: ${{ steps.trufflehog-range.outputs.head }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (full scan)
        if: steps.trufflehog-range.outputs.mode == 'full'
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.94.1
        with:
          path: ./
          extra_args: --debug --only-verified

  security-summary:
    name: Security Scanning Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [dependency-review, codeql, npm-audit, sbom, secret-scanning]

    steps:
      - name: Verify required security jobs succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node --input-type=module <<'EOF'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const allowedSkipped = new Set(['dependency-review']);
          const failures = [];

          for (const [job, result] of Object.entries(needs)) {
            if (result.result === 'success') continue;
            if (result.result === 'skipped' && allowedSkipped.has(job)) continue;
            failures.push(`${job}=${result.result}`);
          }

          if (failures.length > 0) {
            console.error(`Required security jobs failed: ${failures.join(', ')}`);
            process.exit(1);
          }

          console.log('All required security jobs passed.');
          EOF
