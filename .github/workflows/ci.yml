name: CI

on:
  push:
    branches: [main, develop, 'remediation/**', 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main, develop]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks that don't require test sharding
  quick-checks:
    name: Quick Checks (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            .tsbuildinfo
            .tsbuildinfo.build
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-

      - name: Cache dist folder
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-${{ hashFiles('src/**/*.ts', 'tsconfig*.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dist-

      - name: Validate action metadata consistency
        run: npm run validate:actions

      - name: Build (required for dynamic imports)
        run: npx turbo run build

      - name: Verify documentation matches code
        run: |
          # Import actual counts from source of truth
          EXPECTED_TOOLS=$(node -p "require('./dist/schemas/index.js').TOOL_COUNT")
          EXPECTED_ACTIONS=$(node -p "require('./dist/schemas/index.js').ACTION_COUNT")

          echo "Source of truth: ${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions"

          # Check README.md mentions correct count
          if ! grep -q "${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions" README.md; then
            echo "❌ README.md has incorrect action count"
            echo "   Expected: ${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions"
            echo "   Current: $(grep -o '[0-9]* tools, [0-9]* actions' README.md || echo 'not found')"
            exit 1
          fi

          # Check SKILL.md mentions correct count
          if ! grep -q "${EXPECTED_TOOLS} tools with ${EXPECTED_ACTIONS} actions" docs/guides/SKILL.md; then
            echo "❌ SKILL.md has incorrect action count"
            echo "   Expected: ${EXPECTED_TOOLS} tools with ${EXPECTED_ACTIONS} actions"
            echo "   Current: $(grep -o '[0-9]* tools with [0-9]* actions' docs/guides/SKILL.md || echo 'not found')"
            exit 1
          fi

          echo "✅ Documentation action counts are correct (${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions)"

      - name: Validate metadata consistency (strict mode)
        run: npm run check:metadata-strict

      - name: Validate cross-map completeness
        run: npm test -- --run tests/contracts/cross-map-consistency.test.ts

      - name: Check for hardcoded count references
        run: bash scripts/check-hardcoded-counts.sh

      - name: Validate exact tool count
        run: |
          node -e "
          const { TOOL_DEFINITIONS } = require('./dist/mcp/registration/tool-definitions.js');
          const { TOOL_COUNT } = require('./dist/schemas/index.js');

          if (TOOL_DEFINITIONS.length !== TOOL_COUNT) {
            console.error(\`❌ TOOL_DEFINITIONS length (\${TOOL_DEFINITIONS.length}) !== TOOL_COUNT (\${TOOL_COUNT})\`);
            process.exit(1);
          }

          console.log(\`✅ Tool count validated: \${TOOL_COUNT} tools\`);
          "

      - name: Check placeholders
        run: npx turbo run check:placeholders

      - name: Type check
        run: npx turbo run typecheck

      - name: Lint
        run: npx turbo run lint

      - name: Check architecture
        run: npm run check:architecture

      - name: Check integration wiring
        run: npm run check:integration-wiring

      - name: Format check
        run: npx turbo run format:check

  # Fast unit tests (no sharding needed)
  test-fast:
    name: Fast Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .turbo
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Run fast tests with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_wait_seconds: 10
          command: npm run test:fast

  # Parallel test execution with sharding (slower integration tests)
  test-integration:
    name: Integration Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total_shards: [4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .turbo
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-${{ matrix.shard }}-
            ${{ runner.os }}-turbo-test-
            ${{ runner.os }}-turbo-

      - name: Run integration tests with retry (shard ${{ matrix.shard }}/${{ matrix.total_shards }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          command: npm run test:integration -- --shard=${{ matrix.shard }}/${{ matrix.total_shards }}

  mcp-http-task-contract:
    name: MCP HTTP Task Contract
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Run MCP HTTP task contract checks
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 15
          command: npm run test:mcp-http-task-contract

  # Build after all tests pass
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test-fast, test-integration, mcp-http-task-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            .tsbuildinfo
            .tsbuildinfo.build
          key: ${{ runner.os }}-tsbuildinfo-build-${{ hashFiles('src/**/*.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-build-
            ${{ runner.os }}-tsbuildinfo-

      - name: Cache dist folder
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-build-${{ hashFiles('src/**/*.ts', 'tsconfig*.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dist-build-
            ${{ runner.os }}-dist-

      - name: Build
        run: npx turbo run build

      - name: Smoke test built artifacts
        run: npm run smoke

      - name: Validate server.json
        run: npm run validate:server-json

      - name: Validate server.json (extended)
        run: npm run validate:server-json-extended

      - name: Check package can be packed
        run: npm pack --dry-run

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Run security audit (warn on moderate)
        run: npm audit --audit-level=moderate
        continue-on-error: true
