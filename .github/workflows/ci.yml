name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Fast checks that don't require test sharding
  quick-checks:
    name: Quick Checks (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache TypeScript build info
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .tsbuildinfo
            .tsbuildinfo.build
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-

      - name: Cache dist folder
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-${{ hashFiles('src/**/*.ts', 'tsconfig*.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dist-

      - name: Validate action metadata consistency
        run: npm run validate:actions

      - name: Build (required for dynamic imports)
        run: npm run build

      - name: Verify documentation matches code
        run: |
          # Import actual counts from source of truth
          EXPECTED_TOOLS=$(node --input-type=module -e "import { TOOL_COUNT } from './dist/schemas/index.js'; console.log(TOOL_COUNT)")
          EXPECTED_ACTIONS=$(node --input-type=module -e "import { ACTION_COUNT } from './dist/schemas/index.js'; console.log(ACTION_COUNT)")

          echo "Source of truth: ${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions"

          # Check README.md mentions correct count
          if ! grep -q "${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions" README.md; then
            echo "❌ README.md has incorrect action count"
            echo "   Expected: ${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions"
            echo "   Current: $(grep -o '[0-9]* tools, [0-9]* actions' README.md || echo 'not found')"
            exit 1
          fi

          # Check SKILL.md mentions correct count
          if ! grep -q "${EXPECTED_TOOLS} tools with ${EXPECTED_ACTIONS} actions" docs/guides/SKILL.md; then
            echo "❌ SKILL.md has incorrect action count"
            echo "   Expected: ${EXPECTED_TOOLS} tools with ${EXPECTED_ACTIONS} actions"
            echo "   Current: $(grep -o '[0-9]* tools with [0-9]* actions' docs/guides/SKILL.md || echo 'not found')"
            exit 1
          fi

          echo "✅ Documentation action counts are correct (${EXPECTED_TOOLS} tools, ${EXPECTED_ACTIONS} actions)"

      - name: Validate metadata consistency (strict mode)
        run: npm run check:metadata-strict

      - name: Validate Zod schema markers
        run: npm run check:zod-markers

      - name: Validate cross-map completeness
        run: npm test -- --run tests/contracts/cross-map-consistency.test.ts

      - name: Check for hardcoded count references
        run: bash scripts/check-hardcoded-counts.sh

      - name: Validate exact tool count
        run: |
          node --input-type=module -e "
          import { TOOL_DEFINITIONS } from './dist/mcp/registration/tool-definitions.js';
          import { TOOL_COUNT } from './dist/schemas/index.js';

          if (TOOL_DEFINITIONS.length !== TOOL_COUNT) {
            console.error(\`❌ TOOL_DEFINITIONS length (\${TOOL_DEFINITIONS.length}) !== TOOL_COUNT (\${TOOL_COUNT})\`);
            process.exit(1);
          }

          console.log(\`✅ Tool count validated: \${TOOL_COUNT} tools\`);
          "

      - name: Check placeholders
        run: npm run check:placeholders

      - name: Check metadata drift
        run: npm run check:drift

      - name: Type check
        run: npm run typecheck
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Lint
        run: npm run lint
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Check architecture
        run: npm run check:architecture

      - name: Check integration wiring
        run: npm run check:integration-wiring

      - name: Format check
        run: npm run format:check

      - name: Check JWT scope (security - no jwt.sign outside auth/)
        run: npm run check:jwt-scope

      - name: Check hardcoded secrets (security - no committed credentials)
        run: npm run check:secrets

  # Fast unit tests with Vitest sharding
  test-fast:
    name: Fast Tests (Node ${{ matrix.node-version }}, Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Restore dependencies cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            .turbo
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Run fast tests with retry (shard ${{ matrix.shard }}/4)
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_wait_seconds: 10
          command: npm run test:fast -- --shard=${{ matrix.shard }}/4

  snapshot-tests:
    name: Snapshot Tests
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Run snapshot regression suite
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_wait_seconds: 10
          command: npm run test:snapshots

  # Parallel test execution with sharding (slower integration tests)
  test-integration:
    name: Integration Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total_shards: [4]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore dependencies cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            .turbo
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-${{ matrix.shard }}-
            ${{ runner.os }}-turbo-test-
            ${{ runner.os }}-turbo-

      - name: Run integration tests with retry (shard ${{ matrix.shard }}/${{ matrix.total_shards }})
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          command: npm run test:integration -- --shard=${{ matrix.shard }}/${{ matrix.total_shards }}

  mcp-http-task-contract:
    name: MCP HTTP Task Contract
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Run MCP HTTP task contract checks
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 15
          command: npm run test:mcp-http-task-contract

  http-transport-failover:
    name: HTTP Transport Failover
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies with retry
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Run HTTP transport failover regression
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 15
          command: npm run test:http-transport-failover

  validate-server-json:
    name: Validate server.json
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate server.json
        run: npm run validate:server-json

      - name: Validate server.json (extended)
        run: npm run validate:server-json-extended

  # Build after all tests pass
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs:
      [
        test-fast,
        snapshot-tests,
        test-integration,
        mcp-http-task-contract,
        http-transport-failover,
        validate-server-json,
      ]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-

      - name: Cache TypeScript build info
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .tsbuildinfo
            .tsbuildinfo.build
          key: ${{ runner.os }}-tsbuildinfo-build-${{ hashFiles('src/**/*.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-build-
            ${{ runner.os }}-tsbuildinfo-

      - name: Cache dist folder
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-build-${{ hashFiles('src/**/*.ts', 'tsconfig*.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dist-build-
            ${{ runner.os }}-dist-

      - name: Build
        run: npm run build

      - name: Smoke test built artifacts
        run: npm run smoke

      - name: Check package can be packed
        run: npm pack --dry-run

  mutation-testing:
    name: Mutation Testing (Critical Paths)
    runs-on: ubuntu-latest
    needs: [test-fast]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run critical-path regression suite
        run: >
          npx vitest run
          tests/contracts/oauth-refresh-errors.test.ts
          tests/contracts/mutation-action-consistency.test.ts
          tests/middleware/mutation-safety-middleware.test.ts
          tests/middleware/write-lock-middleware.test.ts
          tests/services/python-worker.test.ts
          tests/services/duckdb-worker.test.ts
          tests/utils/retry.test.ts
          tests/utils/circuit-breaker-states.test.ts
          tests/utils/circuit-breaker-fallback.test.ts
          tests/unit/circuit-breaker-fallback.test.ts

      - name: Run mutation tests on critical paths (advisory)
        id: mutation_critical
        continue-on-error: true
        run: npx stryker run stryker.critical.conf.mjs

      - name: Report mutation runner instability
        if: steps.mutation_critical.outcome == 'failure'
        run: |
          echo "::warning::Stryker did not discover tests with the current Vitest runner integration."
          echo "::warning::Keeping mutation testing advisory for now; the critical-path regression suite above is still enforced."

  coverage:
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && (
        github.ref_name == 'main' ||
        startsWith(github.ref_name, 'release/') ||
        startsWith(github.ref_name, 'feat/') ||
        startsWith(github.ref_name, 'fix/')
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run coverage tracking suite
        run: npm run test:coverage:tracking

      - name: Generate coverage summary
        id: coverage
        run: |
          # Extract coverage percentages
          STATEMENTS=$(cat coverage/coverage-summary.json | jq -r '.total.statements.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq -r '.total.branches.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq -r '.total.functions.pct')
          LINES=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')

          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT

          # Create badge color based on coverage
          if (( $(echo "$LINES >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$LINES >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Upload coverage reports
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-servalsheets
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));

            const total = coverage.total;
            const statements = total.statements.pct.toFixed(2);
            const branches = total.branches.pct.toFixed(2);
            const functions = total.functions.pct.toFixed(2);
            const lines = total.lines.pct.toFixed(2);

            const comment = `## 📊 Coverage Report

            | Metric | Coverage | Change |
            |--------|----------|--------|
            | **Statements** | ${statements}% | - |
            | **Branches** | ${branches}% | - |
            | **Functions** | ${functions}% | - |
            | **Lines** | ${lines}% | - |

            <details>
            <summary>📁 Coverage by File</summary>

            Full coverage report available in [artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            </details>

            ---
            *🤖 Generated by [Coverage Action](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Report coverage against repo thresholds
        run: |
          STATEMENTS=$(cat coverage/coverage-summary.json | jq -r '.total.statements.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq -r '.total.branches.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq -r '.total.functions.pct')
          LINES=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')

          echo "Coverage Summary:"
          echo "  Statements: $STATEMENTS%"
          echo "  Branches: $BRANCHES%"
          echo "  Functions: $FUNCTIONS%"
          echo "  Lines: $LINES%"

          # Root vitest.config.ts enforces 80/75/80/80 for full coverage runs.
          # This CI job is tracking-only because the broader suite is not yet a stable
          # mandatory gate in every environment.
          if (( $(echo "$LINES < 80" | bc -l) )); then
            echo "::warning::Line coverage ($LINES%) is below repository threshold (80%)"
          fi

          if (( $(echo "$BRANCHES < 75" | bc -l) )); then
            echo "::warning::Branch coverage ($BRANCHES%) is below repository threshold (75%)"
          fi

          if (( $(echo "$FUNCTIONS < 80" | bc -l) )); then
            echo "::warning::Function coverage ($FUNCTIONS%) is below repository threshold (80%)"
          fi

          if (( $(echo "$STATEMENTS < 80" | bc -l) )); then
            echo "::warning::Statement coverage ($STATEMENTS%) is below repository threshold (80%)"
          fi

      - name: Report status
        run: |
          echo "✅ Coverage tracking report generated successfully"
          echo ""
          echo "Coverage: ${{ steps.coverage.outputs.lines }}%"
          echo "Status: ${{ steps.coverage.outputs.color }}"

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check security exception review dates
        run: npm run check:security-exceptions

      - name: Run security audit (fail on high/critical)
        # continue-on-error: node-saml → xml-encryption → node-forge has unfixable high/critical
        # vulns with no upstream fix. Re-evaluate when node-saml v4 stable ships.
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Run security audit (warn on moderate)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    if: always()
    needs: [quick-checks, build, mutation-testing, coverage, security]

    steps:
      - name: Verify required CI jobs succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node --input-type=module <<'EOF'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const allowedSkipped = new Set(['coverage']);
          const failures = [];

          for (const [job, result] of Object.entries(needs)) {
            if (result.result === 'success') continue;
            if (result.result === 'skipped' && allowedSkipped.has(job)) continue;
            failures.push(`${job}=${result.result}`);
          }

          if (failures.length > 0) {
            console.error(`Required CI jobs failed: ${failures.join(', ')}`);
            process.exit(1);
          }

          console.log('All required CI jobs passed.');
          EOF
